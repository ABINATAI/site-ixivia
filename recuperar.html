<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha | Ixivia</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background-color: #030303; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .logo img { height: 60px; border-radius: 50%; box-shadow: 0 0 20px rgba(0,243,255,0.4); }
        h1 { font-family: 'Orbitron', sans-serif; color: #00f3ff; margin-bottom: 15px; }
        p { color: #aaa; font-size: 1.2rem; margin-bottom: 40px; max-width: 400px; }
        .btn-chrome { padding: 15px 35px; background: linear-gradient(145deg, #e6e6e6 0%, #ffffff 10%, #8e8e8e 50%, #fcfcfc 90%, #d1d1d1 100%); color: #000; text-decoration: none; font-weight: 900; text-transform: uppercase; font-family: 'Orbitron', sans-serif; border: none; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: 0.3s; display: inline-block; }
        .btn-chrome:hover { background: #00f3ff; box-shadow: 0 0 20px #00f3ff; transform: scale(1.05); }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(0, 243, 255, 0.2); border-top: 3px solid #00f3ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="logo">
        <img src="icon.png" alt="Ixivia Logo">
        IXIVIA
    </div>
    
    <div class="loader" style="border-top-color: #ff0055;"></div>
    <h1 style="color: #ff0055;">PROTOCOLO DE SEGURANÇA</h1>
    <p>Sua solicitação para criar uma nova senha foi autorizada. Retorne ao aplicativo para definir sua nova credencial.</p>

    <a href="ixivia://reset-callback" class="btn-chrome">CRIAR NOVA SENHA</a>

    <script>
        // Tenta abrir o aplicativo automaticamente após 1.5 segundos
        setTimeout(() => {
            window.location.href = "ixivia://reset-callback";
        }, 1500);
    </script>
</body>
</html>
