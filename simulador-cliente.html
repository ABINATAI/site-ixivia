<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Essa é a tag de ouro que impede o erro do zoom. Ela tem que ser a primeira! -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Simulador de Pedido | Ixivia</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* RESET TOTAL - Garante que ocupe a tela toda no celular */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #d1d5db; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Impede a tela de rolar */
            touch-action: pan-y;
        }

        /* PADRÃO CELULAR: 100% da tela, sem borda, sem carcaça */
        .mapa-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('mapa-meireles.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* EXCEÇÃO PC: Só se a tela for muito larga, ele centraliza e vira um celularzinho */
        @media screen and (min-width: 900px) {
            body {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .mapa-container {
                width: 400px; 
                height: 800px; 
                max-height: 95vh; 
                border-radius: 35px;
                border: 12px solid #1f2937;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }

        /* Restante dos estilos do simulador */
        .map-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
            text-align: center;
            width: 85%;
        }

        .map-header h2 { font-size: 1.1rem; color: #2563eb; margin: 0 0 2px 0; }
        .map-header p { font-size: 0.85rem; color: #6b7280; margin: 0; }

        .pin {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4);
            transform: translate(-50%, -50%);
            animation: pulsar 2s infinite;
        }

        .pin::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #2563eb;
            animation: onda 2s infinite;
        }

        @keyframes pulsar { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }
        @keyframes onda { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .pin-1 { top: 35%; left: 30%; }
        .pin-2 { top: 60%; left: 70%; animation-delay: 0.5s; }
        .pin-3 { top: 75%; left: 40%; animation-delay: 1s; }

.modal-negociacao {
            position: absolute;
            bottom: -100%; 
            left: 0;
            width: 100%;
            background: #ffffff;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            /* O SEGREDO: Uma margem extra embaixo garantindo que fique acima dos botões do celular */
            padding: 30px 20px calc(40px + env(safe-area-inset-bottom)); 
            transition: bottom 0.4s ease-out;
            z-index: 100;
            /* Usa a altura dinâmica real da tela, evitando cortes */
            max-height: 90dvh; 
            overflow-y: auto;
        }
        .modal-negociacao.ativo { bottom: 0; }

        .fechar-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #6b7280;
            cursor: pointer;
        }

        .vizinho-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .vizinho-foto {
            width: 50px;
            height: 50px;
            background: #e5e7eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.95rem; color: #1f2937; }
        
        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 1rem;
            background: #f9fafb;
            box-sizing: border-box;
        }

        .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
        .checkbox-label { display: flex; align-items: center; gap: 10px; font-weight: normal; color: #1f2937; }

        .proposta-destaque {
            background: #eff6ff;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #2563eb;
            margin-top: 20px;
        }

        .proposta-destaque input { font-size: 1.5rem; color: #059669; font-weight: bold; text-align: center; }

        .tela-sucesso { display: none; text-align: center; padding: 20px 0; }
        .tela-sucesso.ativo { display: block; }
        .form-pedido.oculto { display: none; }

        .lojas-botoes { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        
        .btn-loja {
            background: #1f2937; color: white; padding: 12px 20px;
            border-radius: 8px; text-decoration: none; font-weight: bold;
            font-size: 1rem; display: block; text-align: center;
        }

        .btn-disabled {
            background: #d1d5db !important; color: #6b7280 !important;
            cursor: not-allowed; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="mapa-container">
        
        <div class="map-header">
            <h2>Vizinhos Disponíveis</h2>
            <p>Toque em um ícone para iniciar</p>
        </div>

        <div class="pin pin-1" onclick="abrirModal('Ana', '1.2km')">🧺</div>
        <div class="pin pin-2" onclick="abrirModal('Carlos', '800m')">🧺</div>
        <div class="pin pin-3" onclick="abrirModal('Dona Marta', '2.5km')">🧺</div>

        <div class="modal-negociacao" id="modal">
            <button class="fechar-modal" onclick="fecharModal()">×</button>
            
            <div class="vizinho-info">
                <div class="vizinho-foto">👤</div>
                <div>
                    <h3 id="nome-vizinho" style="margin:0; color:#1f2937;">Nome</h3>
                    <p style="margin:0; color: #059669; font-size: 0.9rem; font-weight: bold;">Verificado • A <span id="distancia-vizinho">Xkm</span></p>
                </div>
            </div>

            <div id="form-pedido" class="form-pedido">
                <div class="form-group">
                    <label>Quantas peças de roupa?</label>
                    <select>
                        <option>Cesto Pequeno (Até 15 peças)</option>
                        <option>Cesto Médio (Até 30 peças)</option>
                        <option>Cesto Grande (Mais de 30 peças)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Tipos de Tecido</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" checked> Dia a dia (Algodão, malha)</label>
                        <label class="checkbox-label"><input type="checkbox"> Delicados (Seda, lã)</label>
                        <label class="checkbox-label"><input type="checkbox"> Cama e Banho</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>O que você precisa?</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" checked> Lavar</label>
                        <label class="checkbox-label"><input type="checkbox"> Passar</label>
                        <label class="checkbox-label"><input type="checkbox" checked> Buscar e Entregar</label>
                    </div>
                </div>

                <div class="proposta-destaque">
                    <label style="text-align: center; color: #2563eb; margin-bottom: 5px;">Sua Proposta (Você decide):</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 15px; top: 15px; font-size: 1.2rem; color: #666; font-weight: bold;">R$</span>
                        <input type="number" id="valor-proposta" placeholder="Ex: 40,00" style="padding-left: 50px;">
                    </div>
                </div>

                <button style="width: 100%; margin-top: 20px; background: #2563eb; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer;" onclick="enviarProposta()">Enviar Proposta</button>
            </div>

            <div id="tela-sucesso" class="tela-sucesso">
                <div style="font-size: 4rem; margin-bottom: 10px;">🎯</div>
                <h2 style="color: #2563eb; margin-bottom: 10px;">Proposta Pronta!</h2>
                <p style="color: #1f2937;">Sua oferta de <strong id="valor-final" style="color: #059669; font-size: 1.2rem;">R$ 0,00</strong> para <strong id="nome-final">Nome</strong> está configurada.</p>
                <p style="margin-top: 15px; color: #6b7280;">Para enviar o pedido oficial e garantir a segurança, baixe o aplicativo:</p>
                
                <div class="lojas-botoes">
                    <a href="download.html" class="btn-loja" style="background: #10b981;">Baixar Android</a>
                    <a href="#" class="btn-loja btn-disabled">iOS (Em Breve)</a>
                </div>
                
                <button style="width: 100%; margin-top: 20px; padding: 12px; background: transparent; border: 2px solid #2563eb; color: #2563eb; border-radius: 10px; font-weight: bold; cursor: pointer;" onclick="location.href='index.html'">Voltar ao site</button>
            </div>
        </div>
    </div>

    <script>
        function abrirModal(nome, distancia) {
            document.getElementById('nome-vizinho').innerText = nome;
            document.getElementById('distancia-vizinho').innerText = distancia;
            document.getElementById('nome-final').innerText = nome;
            document.getElementById('form-pedido').classList.remove('oculto');
            document.getElementById('tela-sucesso').classList.remove('ativo');
            document.getElementById('valor-proposta').value = '';
            document.getElementById('modal').classList.add('ativo');
        }

        function fecharModal() { document.getElementById('modal').classList.remove('ativo'); }

        function enviarProposta() {
            const valorInput = document.getElementById('valor-proposta').value;
            if(!valorInput || valorInput <= 0) { alert("Por favor, digite um valor justo para sua proposta."); return; }
            document.getElementById('valor-final').innerText = "R$ " + parseFloat(valorInput).toFixed(2).replace('.', ',');
            document.getElementById('form-pedido').classList.add('oculto');
            document.getElementById('tela-sucesso').classList.add('ativo');
        }
    </script>
</body>
</html>
